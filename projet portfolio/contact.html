<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>Contact</h1>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="projet.html">Projets</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section class="contact">
        <h2>Contactez-moi</h2>

        <!-- FORMULAIRE 1 : Contact simple -->
        <h3>Envoyer un message</h3>
        <form action="#" method="post">

            <label for="nom">Nom :</label>
            <input type="text" id="nom" name="nom" required>

            <label for="email">Email :</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message :</label>
            <textarea id="message" name="message" required></textarea>

            <button type="submit">Envoyer</button>
        </form>

        <!-- FORMULAIRE 2 : Demande de projet -->
        <h3>Proposer un projet</h3>
        <form action="#" method="post">

            <label for="client-nom">Votre nom :</label>
            <input type="text" id="client-nom" name="client-nom" required>

            <label for="client-email">Votre email :</label>
            <input type="email" id="client-email" name="client-email" required>

            <label for="type-projet">Type de projet :</label>
            <select id="type-projet" name="type-projet" required>
                <option value="">-- Choisir --</option>
                <option value="site-vitrine">Site vitrine</option>
                <option value="portfolio">Portfolio</option>
                <option value="application">Application web</option>
                <option value="autre">Autre</option>
            </select>

            <label for="description">Description du projet :</label>
            <textarea id="description" name="description" required></textarea>

            <button type="submit">Envoyer ma demande</button>
        </form>

        <!-- FORMULAIRE 3 : Recherche de projets -->
        <h3>Rechercher un projet</h3>
        <form action="#" method="get">

            <label for="recherche">Mot-clé :</label>
            <input type="search" id="recherche" name="recherche" 
                   placeholder="Ex : HTML, JavaScript, galerie...">

            <button type="submit">Rechercher</button>
        </form>

    </section>

    <footer>
        <p>© 2026 - Mon Portfolio</p>
    </footer>

</body>
</html>
