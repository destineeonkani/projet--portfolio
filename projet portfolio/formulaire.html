!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>inscription Etudiant</title>
 <style>
       body {
            font-family: Cambria;
            background-color: #f2f2f2;
         }

         .container {
            width: 350px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        h2 {
            text-align: center;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background-color: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        .message {
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Inscription Étudiant</h2>

    <form id="formInscription">

        <input type="text" id="nom" placeholder="Nom">
        <input type="text" id="prenom" placeholder="Prénom">
        <input type="email" id="email" placeholder="Email">

        <select id="filiere">
            <option value="">Choisir une filière</option>
            <option>Informatique</option>
            <option>Réseaux</option>
            <option>Mathématiques</option>
        </select>

        <button type="submit">Envoyer</button>

    </form>

    <div class="message" id="message"></div>
</div>

<script>
    document.getElementById("formInscription").addEventListener("submit", function(e) {
        
        e.preventDefault();

        let nom = document.getElementById("nom").value;
        let prenom = document.getElementById("prenom").value;
        let email = document.getElementById("email").value;
        let filiere = document.getElementById("filiere").value;

        let message = document.getElementById("message");

        if(nom === "" || prenom === "" || email === "" || filiere === "") {
            message.style.color = "red";
            message.innerText = "Veuillez remplir tous les champs !";
        } else {
            message.style.color = "green";
            message.innerText = "Inscription réussie ! 🎉";

            document.getElementById("formInscription").reset();
        }

    });
</script>
<body>
</body>
</html>
